<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
    <style>
        .A{
            background-color: beige;
        }
        .B{
            background-color:cadetblue ;
        }
    </style>
</head>
<body>
    <h2><span class="B">Choose Subject :</span> </h2>
    <div class="A">
      
    <label for = "101">Mathematics</label>
    <input type="checkbox" id="101" value="mathematics" name="subject"><br>
    <label for = "102">Science</label>
    <input type="checkbox" id="102" value="Science" name="subject"><br>
    <label for = "103">Physics</label>
    <input type="checkbox" id="103" value="Physics" name="subject"><br>
    <label for = "104">Chemistry</label>
    <input type="checkbox" id="104" value="Chemistry" name="subject">
    </div>
</body>
</html>
