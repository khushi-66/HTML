<body> <h1>Log in Form</h1>
    <form action = "thank you.html" method = "get">
         <label for ="name"> Username :</label>

          <label for ="Email"> Email  :</label>
         <input type="text" id = "Email"  name = "email" placeholder="enter email"required/><br><br>
           <label for ="password"> Password :</label>

         <br><br>

              <option value="st">ST</option>

         </select>
         <label for ="file"> Choose File  :</label>

   <br><br>
         <label for ="Address"> Address :</label>
         <input type="text" id = "Address" name = "Address" placeholder="enter Address"required/>
          <label for="A">Pick Color : </label>
         <input type = "color" name="color" id="color">
         
         <br><br>

         <input type="number" id = "Phone No." name = "phone no." placeholder="enter phone no."required/><br><br>

         <br><br>
         
         <label >Select Gender  : </label>

         <input type="radio" name="gender" id="female">

         <p>Tell About Yourself</p>

          <br><br><input type="submit"value= "Log in ">
          
         </form>
</body>
